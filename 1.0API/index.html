<html>
  <head>
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <title>Gray Whale API Docs</title>
    <style>
      /* Custom header */
      #company-header {
        background-color: #abb8c3;
        padding: 12px 24px;
        display: flex;
        align-items: left;
      }

      #company-header img {
        height: 60px;
      }

      /* Override Swagger's own header if you want to hide it */
      .swagger-ui .topbar {
        display: none;
      }

      .swagger-ui .servers,
      .swagger-ui div:has(> .servers) {
        display: none !important;
      }
    </style>
  </head>
  <body>

    <div id="company-header">
      <img src="../graywhale_logo.png" alt="Company Logo">
    </div>

    <div id="swagger-ui"></div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      const methodOrder = { post: 0, get: 1, put: 2, delete: 3, patch: 4, options: 5, head: 6, trace: 7 }
      const ui = SwaggerUIBundle({
        url: './openapi.json',
        dom_id: "#swagger-ui",
        layout: "BaseLayout",
        deepLinking: true,
        showExtensions: true,
        showCommonExtensions: true,
        defaultModelsExpandDepth: -1,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
      })
    </script>
  </body>
</html>
